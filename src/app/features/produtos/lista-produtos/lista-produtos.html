@for (item of produtos(); track item) 
{
    <app-produto
        [nome] = "item.nome"
        [preco] = "item.preco"
        (produtoSelecionado)="exibirProduto($event)"
    ></app-produto>
    <p><button (click)="adicionarProduto(item.nome, item.preco)">Adicionar Produto</button></p>
}
<h2>Total de produtos: {{totalProdutos()}}</h2>
<h2>Total de produtos: {{valorTotal() | precoFormatado}}</h2>
<p><button (click)="subtituirProdutos()">Substituir Produto</button></p>
